# Inventory Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: otel-demo
  labels:
    app: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: app
          image: ghcr.io/open-telemetry/demo:1.11.1-recommendationservice
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat > /tmp/server.py << 'PYEOF'
              import http.server, json, random, time, os
              from opentelemetry import trace
              from opentelemetry.sdk.trace import TracerProvider
              from opentelemetry.sdk.trace.export import BatchSpanExporter
              from opentelemetry.exporter.otlp.proto.http.trace_exporter import OTLPSpanExporter
              from opentelemetry.sdk.resources import Resource
              from opentelemetry.semconv.resource import ResourceAttributes

              resource = Resource.create({
                  ResourceAttributes.SERVICE_NAME: "inventory-service",
                  "k8s.namespace.name": os.environ.get("POD_NAMESPACE", "otel-demo"),
                  "k8s.pod.name": os.environ.get("POD_NAME", "unknown"),
              })
              provider = TracerProvider(resource=resource)
              exporter = OTLPSpanExporter(endpoint=os.environ.get("OTEL_EXPORTER_OTLP_ENDPOINT", "http://otel-collector:4318") + "/v1/traces")
              provider.add_span_processor(BatchSpanExporter(exporter))
              trace.set_tracer_provider(provider)
              tracer = trace.get_tracer("inventory-service")

              class Handler(http.server.BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == "/health":
                          self.send_response(200)
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          self.wfile.write(b'{"status":"ok"}')
                          return
                      with tracer.start_as_current_span("GET /api/check") as span:
                          span.set_attribute("http.method", "GET")
                          span.set_attribute("http.route", "/api/check")
                          # Redis cache check
                          with tracer.start_as_current_span("redis.GET stock") as cache:
                              cache.set_attribute("db.system", "redis")
                              cache.set_attribute("db.statement", "GET product:stock:*")
                              time.sleep(random.uniform(0.001, 0.005))
                              cache.set_attribute("cache.hit", random.random() > 0.3)
                          # DB query
                          with tracer.start_as_current_span("SELECT inventory") as db:
                              db.set_attribute("db.system", "postgresql")
                              db.set_attribute("db.statement", "SELECT quantity FROM inventory WHERE product_id = $1")
                              time.sleep(random.uniform(0.01, 0.03))
                          stock = random.randint(0, 100)
                          if stock == 0:
                              span.set_attribute("inventory.out_of_stock", True)
                          self.send_response(200)
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          self.wfile.write(json.dumps({"available": stock > 0, "quantity": stock}).encode())
                  def log_message(self, format, *args): pass

              print("inventory-service starting on :8080")
              http.server.HTTPServer(("", 8080), Handler).serve_forever()
              PYEOF
              pip install opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp-proto-http opentelemetry-semantic-conventions -q 2>/dev/null
              python3 /tmp/server.py
          ports:
            - containerPort: 8080
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
