name: Security Scan

on:
  push:
    branches: [main, develop]
    paths:
      - 'kubilitics-backend/Dockerfile'
      - 'kubilitics-frontend/Dockerfile'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'kubilitics-backend/Dockerfile'
      - 'kubilitics-frontend/Dockerfile'
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-backend:
    name: Trivy Scan - Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t kubilitics-backend:test kubilitics-backend/

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'kubilitics-backend:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          # Report vulnerabilities but don't fail — Go stdlib CVEs often
          # have no fix until the next Go release. Dependabot handles upgrades.
          exit-code: '0'
          ignore-unfixed: true

  trivy-frontend:
    name: Trivy Scan - Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t kubilitics-frontend:test kubilitics-frontend/

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'kubilitics-frontend:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
