name: Security Scan

on:
  push:
    branches: [main, develop]
    paths:
      - 'kubilitics-backend/Dockerfile'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'kubilitics-backend/Dockerfile'
  schedule:
    # Run weekly on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-backend:
    name: Trivy Scan - Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        # Dockerfile is self-contained: it clones kcli from GitHub during build
        run: docker build -t kubilitics-backend:test kubilitics-backend/

      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: 'kubilitics-backend:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # report but do not fail the build

