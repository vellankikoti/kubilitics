name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'kubilitics-backend/**'
      - 'kcli/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'kubilitics-backend/**'
      - 'kcli/**'
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.8'  # must be >= go directive in kcli/go.mod (1.25.0) and kubilitics-backend/go.mod (1.24.0)
  # Pinned kubectl — keep aligned with k8s.io/client-go major version in go.mod
  # k8s.io/client-go v0.33.x → kubectl v1.33.x
  KUBECTL_VERSION: 'v1.33.3'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache-dependency-path: kubilitics-backend/go.sum

    - name: Install dependencies
      working-directory: kubilitics-backend
      run: go mod download

    - name: Build kcli binary (for integration tests)
      run: |
        mkdir -p kubilitics-backend/bin
        cd kcli
        CGO_ENABLED=0 go build -ldflags="-s -w" -o ../kubilitics-backend/bin/kcli ./cmd/kcli
        chmod +x ../kubilitics-backend/bin/kcli
        echo "$GITHUB_WORKSPACE/kubilitics-backend/bin" >> $GITHUB_PATH

    - name: Install kubectl (pinned, matches client-go version)
      run: |
        curl -fsSL "https://dl.k8s.io/release/${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl" -o kubectl
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        kubectl version --client --output=json

    - name: Run tests
      run: |
        mkdir -p $GITHUB_WORKSPACE/test_reports/backend
        cd kubilitics-backend
        go test -v -race -coverprofile=coverage.out -covermode=atomic ./... \
          2>&1 | tee $GITHUB_WORKSPACE/test_reports/backend/test.log

    - name: Run kcli integration tests
      # Requires a live backend — expected to skip gracefully in CI
      continue-on-error: true
      run: |
        cd kubilitics-backend
        go test -v -timeout 10m ./tests/integration/kcli_test.go -run TestKCLI \
          2>&1 | tee $GITHUB_WORKSPACE/test_reports/backend/kcli-integration-test.log \
          || echo "kcli integration tests skipped (require running backend)"

    - name: Run govulncheck
      working-directory: kubilitics-backend
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

    - name: Enforce addon coverage
      run: |
        cd kubilitics-backend
        go test -coverprofile=addon_coverage.out ./internal/addon/...
        COVERAGE=$(go tool cover -func=addon_coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}' | awk '{print int($1)}')
        echo "Add-on total coverage: $COVERAGE%"
        if [ "$COVERAGE" -lt 70 ]; then
          echo "Coverage is $COVERAGE%, which is below the 70% threshold!"
          # exit 1 
        fi

    - name: Upload test report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: backend-test-report
        path: ${{ github.workspace }}/test_reports/backend/

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./kubilitics-backend/coverage.out
        flags: backend
        name: backend-coverage

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6

    # Read the exact Go version from go.mod so golangci-lint and the module
    # always agree — avoids "golangci-lint built with goX.Y can't lint goX.Z"
    # errors that appear when Dependabot bumps the `go` directive in go.mod.
    - uses: actions/setup-go@v6
      with:
        go-version-file: kubilitics-backend/go.mod
        cache: false

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        # Use goinstall so golangci-lint is built with the same Go version
        # from setup-go (read from go.mod). Pre-built binaries may lag behind
        # the Go version in go.mod, causing "goX.Y can't lint goX.Z" errors.
        install-mode: goinstall
        version: v1.64.8
        working-directory: kubilitics-backend
        args: --timeout=8m

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, lint]

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Build
      working-directory: kubilitics-backend
      run: CGO_ENABLED=0 go build -v -ldflags="-s -w" -o bin/kubilitics-backend ./cmd/server

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: kubilitics-backend-linux
        path: kubilitics-backend/bin/kubilitics-backend
