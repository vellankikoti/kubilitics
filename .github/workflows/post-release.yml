# Post-release automation: update package manager manifests after a successful release
name: Post-Release Distribution

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

jobs:
  # ── Update winget manifest for desktop app ──────────────────────────────
  update-winget:
    name: Submit winget Manifest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_WINGET_TOKEN: ${{ secrets.WINGET_TOKEN != '' }}
    steps:
      - name: Skip if no token
        if: env.HAS_WINGET_TOKEN != 'true'
        run: echo "WINGET_TOKEN not set — skipping winget submission"

      - name: Wait for release assets to propagate
        if: env.HAS_WINGET_TOKEN == 'true'
        run: sleep 60

      - uses: vedantmgoyal9/winget-releaser@v2
        if: env.HAS_WINGET_TOKEN == 'true'
        id: winget-attempt
        continue-on-error: true
        with:
          identifier: Kubilitics.Kubilitics
          installers-regex: 'Kubilitics[_-].*x64[-_]setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

      - name: Retry winget submission
        if: env.HAS_WINGET_TOKEN == 'true' && steps.winget-attempt.outcome == 'failure'
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Kubilitics.Kubilitics
          installers-regex: 'Kubilitics[_-].*x64[-_]setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

  # ── Update Homebrew tap for desktop app ─────────────────────────────────
  update-homebrew:
    name: Update Homebrew Tap
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        if: env.HAS_HOMEBREW_TOKEN == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Download release checksums (retry up to 3 times with 60s wait)
          for i in 1 2 3; do
            curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/checksums.txt" \
              -o checksums.txt && break
            echo "Attempt $i failed, retrying in 60s..."
            sleep 60
          done
          [ -f checksums.txt ] || { echo "No checksums found after retries — skipping"; exit 0; }

          # Update kubilitics formula version
          if [ -f "packaging/homebrew/kubilitics.rb" ]; then
            sed -e "s/version \".*\"/version \"${VERSION}\"/" \
              packaging/homebrew/kubilitics.rb > kubilitics-updated.rb

            git clone "https://x-access-token:${GH_TOKEN}@github.com/kubilitics/homebrew-tap.git" tap
            cp kubilitics-updated.rb tap/Formula/kubilitics.rb
            cd tap
            git config user.name "kubilitics-bot"
            git config user.email "bot@kubilitics.io"
            git add Formula/kubilitics.rb
            git commit -m "kubilitics ${VERSION}" || echo "No changes"
            git push
          fi
