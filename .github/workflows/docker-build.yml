name: Docker Build and Push

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'kubilitics-backend/**'
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to build'
        required: true
        type: choice
        options:
          - backend
          - all
      tag:
        description: 'Image tag (default: latest)'
        required: false
        type: string
        default: 'latest'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: kubilitics-backend
  FRONTEND_IMAGE: kubilitics-frontend
  PLATFORMS: linux/amd64,linux/arm64

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Skip Docker builds for Dependabot PRs — dependency bumps don't change
    # Dockerfile logic and the full multi-platform build adds ~25 min of noise.
    # Dependabot's own CI (backend-ci) validates the Go code changes.
    if: |
      github.actor != 'dependabot[bot]' && (
        github.event_name == 'workflow_dispatch' && (github.event.inputs.component == 'backend' || github.event.inputs.component == 'all') ||
        github.event_name != 'workflow_dispatch'
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU (for multi-platform docker run verification)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for backend
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}

      - name: Build and push backend image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./kubilitics-backend
          file: ./kubilitics-backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.PLATFORMS }}
          provenance: false

      - name: Build backend image for PR scan
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./kubilitics-backend
          file: ./kubilitics-backend/Dockerfile
          push: false
          load: true
          tags: kubilitics-backend:pr-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Trivy scan backend image
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: kubilitics-backend:pr-scan
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

  frontend:
    name: Build Frontend (if Dockerfile exists)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.actor != 'dependabot[bot]' && (
        github.event_name == 'workflow_dispatch' && github.event.inputs.component == 'all' ||
        github.event_name != 'workflow_dispatch'
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check if frontend Dockerfile exists
        id: check-frontend-dockerfile
        run: |
          if [ -f "kubilitics-frontend/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check-frontend-dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.check-frontend-dockerfile.outputs.exists == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for frontend
        if: steps.check-frontend-dockerfile.outputs.exists == 'true'
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}

      - name: Build and push frontend image
        if: steps.check-frontend-dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./kubilitics-frontend
          file: ./kubilitics-frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.PLATFORMS }}
          provenance: false

      - name: Skip frontend build
        if: steps.check-frontend-dockerfile.outputs.exists == 'false'
        run: echo "Frontend Dockerfile not found, skipping build"
