<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#4169E1" />
  <g fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(50,46)">
    <!-- Outer hexagon -->
    <polygon points="0,-28 24.25,-14 24.25,14 0,28 -24.25,14 -24.25,-14" />
    <!-- Center circle -->
    <circle cx="0" cy="0" r="8" fill="white" stroke="none" />
    <!-- Spokes from center to hexagon vertices -->
    <line x1="0" y1="-8" x2="0" y2="-28" />
    <line x1="7" y1="4" x2="24.25" y2="14" />
    <line x1="-7" y1="4" x2="-24.25" y2="14" />
    <!-- Top pentagon / house shape -->
    <polygon points="0,-38 10,-32 8,-24 -8,-24 -10,-32" fill="white" stroke="white" stroke-width="2" />
  </g>
</svg>
