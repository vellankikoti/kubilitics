<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Rancher simplified cow head -->
  <!-- Head oval -->
  <ellipse cx="12" cy="13" rx="7" ry="6" fill="#0075A8"/>
  <!-- Ears -->
  <ellipse cx="5.5" cy="10" rx="2" ry="2.5" fill="#0075A8"/>
  <ellipse cx="18.5" cy="10" rx="2" ry="2.5" fill="#0075A8"/>
  <!-- Eyes -->
  <circle cx="9.5" cy="12" r="1.2" fill="white"/>
  <circle cx="14.5" cy="12" r="1.2" fill="white"/>
  <circle cx="9.7" cy="12.2" r="0.5" fill="#0075A8"/>
  <circle cx="14.7" cy="12.2" r="0.5" fill="#0075A8"/>
  <!-- Nostrils -->
  <ellipse cx="10.5" cy="16" rx="1" ry="0.7" fill="white" opacity="0.7"/>
  <ellipse cx="13.5" cy="16" rx="1" ry="0.7" fill="white" opacity="0.7"/>
  <!-- Horns -->
  <path d="M7 8 Q5 4 7 3" stroke="#0075A8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M17 8 Q19 4 17 3" stroke="#0075A8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
</svg>
